name: ci

on:
    push:
        branches:
            - main
        paths-ignore:
            - "**/*.md"
            - ".vscode/**"
            - ".gitignore"

jobs:
    check_formatting:
        uses: ./.github/workflows/check_formatting.yml

    lint:
        needs: check_formatting
        uses: ./.github/workflows/lint.yml

    type_check:
        needs: lint
        uses: ./.github/workflows/type_check.yml

    build_and_deploy_to_gh_pages:
        needs: type_check
        uses: ./.github/workflows/build_and_deploy_to_gh_pages.yml
        permissions:
            id-token: write
            pages: write
